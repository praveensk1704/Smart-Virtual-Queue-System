<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register User - Smart Virtual Queue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>🚦 Smart Virtual Queue - Crowd Control System</h1>
            <nav>
                <a href="index.html" class="nav-btn">Dashboard</a>
                <a href="register.html" class="nav-btn active">Register User</a>
                <a href="gate.html" class="nav-btn">Gate Simulator</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="panel register-panel">
            <h2>📝 User Registration</h2>
            <p class="subtitle">Capture face via webcam to register a new user. The system will auto-assign a group.</p>

            <div class="register-layout">
                <div class="camera-section">
                    <div class="camera-container">
                        <video id="video" autoplay playsinline></video>
                        <canvas id="canvas" style="display:none;"></canvas>
                        <div class="camera-overlay" id="camera-overlay">
                            <div class="face-guide"></div>
                            <p>Position face within the frame</p>
                        </div>
                    </div>
                    <div class="camera-controls">
                        <button class="btn btn-camera" id="btn-start-camera" onclick="startCamera()">📷 Start Camera</button>
                        <button class="btn btn-capture" id="btn-capture" onclick="capturePhoto()" disabled>📸 Capture Face</button>
                    </div>
                </div>

                <div class="form-section">
                    <div class="captured-preview" id="captured-preview">
                        <p class="empty-msg">No photo captured yet</p>
                    </div>

                    <div class="form-group">
                        <label for="user-name">Full Name:</label>
                        <input type="text" id="user-name" placeholder="Enter user's full name" maxlength="100">
                    </div>

                    <button class="btn btn-register" id="btn-register" onclick="registerUser()" disabled>
                        ✅ Register User
                    </button>

                    <div id="register-result" class="result-box" style="display:none;"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        function getApiBaseUrl() {
            const params = new URLSearchParams(window.location.search);
            const queryUrl = params.get('api');
            if (queryUrl) {
                localStorage.setItem('API_BASE_URL', queryUrl);
                return queryUrl.replace(/\/$/, '');
            }

            const savedUrl = localStorage.getItem('API_BASE_URL');
            if (savedUrl) {
                return savedUrl.replace(/\/$/, '');
            }

            return window.location.origin;
        }

        const API_BASE_URL = getApiBaseUrl();

        let stream = null;
        let capturedImage = null;

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480, facingMode: 'user' }
                });
                const video = document.getElementById('video');
                video.srcObject = stream;
                document.getElementById('btn-capture').disabled = false;
                document.getElementById('btn-start-camera').textContent = '📷 Camera Active';
                document.getElementById('btn-start-camera').disabled = true;
                document.getElementById('camera-overlay').style.display = 'flex';
            } catch (err) {
                alert('Camera access denied or not available. Error: ' + err.message);
            }
        }

        function capturePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            
            capturedImage = canvas.toDataURL('image/jpeg', 0.9);
            
            const preview = document.getElementById('captured-preview');
            preview.innerHTML = `<img src="${capturedImage}" alt="Captured face">`;
            
            document.getElementById('btn-register').disabled = false;
        }

        async function registerUser() {
            const name = document.getElementById('user-name').value.trim();
            if (!name) {
                alert('Please enter user name');
                return;
            }
            if (!capturedImage) {
                alert('Please capture a face photo first');
                return;
            }

            const btn = document.getElementById('btn-register');
            btn.disabled = true;
            btn.textContent = '⏳ Registering...';

            const resultBox = document.getElementById('register-result');

            try {
                const res = await fetch(`${API_BASE_URL}/api/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name: name, image: capturedImage })
                });
                const data = await res.json();

                if (data.success) {
                    resultBox.className = 'result-box success';
                    resultBox.innerHTML = `
                        <h3>✅ Registration Successful!</h3>
                        <p><strong>Name:</strong> ${data.user.name}</p>
                        <p><strong>User ID:</strong> ${data.user.user_id}</p>
                        <p><strong>Assigned Group:</strong> Group ${data.user.group_number}</p>
                        <p class="msg">${data.message}</p>
                        <div id="qr-section" style="margin-top:15px; text-align:center;">
                            <p style="color:#00d4ff; font-size:0.85rem; margin-bottom:8px;">📱 Your Entry QR Ticket:</p>
                            <canvas id="qr-canvas" style="border-radius:12px; background:#fff; padding:10px;"></canvas>
                            <br>
                            <button onclick="downloadQR()" class="btn" style="margin-top:10px; border-color:#00d4ff; color:#00d4ff;">
                                ⬇️ Download QR Ticket
                            </button>
                        </div>
                    `;
                    // Generate QR code
                    const qrData = JSON.stringify({
                        id: data.user.user_id,
                        name: data.user.name,
                        group: data.user.group_number,
                        ts: Date.now()
                    });
                    QRCode.toCanvas(document.getElementById('qr-canvas'), qrData, {
                        width: 200,
                        margin: 2,
                        color: { dark: '#0f1923', light: '#ffffff' }
                    });
                    // Subscribe for push notifications
                    subscribeForNotifications(data.user.group_number, data.user.name);

                    document.getElementById('user-name').value = '';
                    capturedImage = null;
                    document.getElementById('captured-preview').innerHTML = '<p class="empty-msg">No photo captured yet</p>';
                } else {
                    resultBox.className = 'result-box error';
                    resultBox.innerHTML = `<h3>❌ Registration Failed</h3><p>${data.error}</p>`;
                }
            } catch (err) {
                resultBox.className = 'result-box error';
                resultBox.innerHTML = `<h3>❌ Error</h3><p>${err.message}</p>`;
            }

            resultBox.style.display = 'block';
            btn.disabled = false;
            btn.textContent = '✅ Register User';
        }

        function downloadQR() {
            const canvas = document.getElementById('qr-canvas');
            if (!canvas) return;
            // Create a larger ticket image with info
            const ticket = document.createElement('canvas');
            ticket.width = 300;
            ticket.height = 420;
            const ctx = ticket.getContext('2d');
            // Background
            ctx.fillStyle = '#0f1923';
            ctx.fillRect(0, 0, 300, 420);
            // Border
            ctx.strokeStyle = '#00d4ff';
            ctx.lineWidth = 2;
            ctx.roundRect(10, 10, 280, 400, 15);
            ctx.stroke();
            // Title
            ctx.fillStyle = '#00d4ff';
            ctx.font = 'bold 16px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('🚦 SMART VIRTUAL QUEUE', 150, 45);
            ctx.font = '12px sans-serif';
            ctx.fillStyle = '#8899aa';
            ctx.fillText('ENTRY TICKET', 150, 65);
            // QR code
            ctx.drawImage(canvas, 50, 80, 200, 200);
            // Info
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 14px sans-serif';
            const nameEl = document.querySelector('.result-box.success p:nth-child(2)');
            const groupEl = document.querySelector('.result-box.success p:nth-child(4)');
            if (nameEl) ctx.fillText(nameEl.textContent, 150, 310);
            if (groupEl) ctx.fillText(groupEl.textContent, 150, 335);
            ctx.fillStyle = '#6688aa';
            ctx.font = '10px sans-serif';
            ctx.fillText('Show this QR code at the gate', 150, 365);
            ctx.fillText(new Date().toLocaleString(), 150, 385);
            // Download
            const link = document.createElement('a');
            link.download = 'queue-ticket.png';
            link.href = ticket.toDataURL('image/png');
            link.click();
        }

        // ── Push Notification Subscription ──
        async function subscribeForNotifications(groupNumber, userName) {
            if (!('Notification' in window) || !('serviceWorker' in navigator)) return;
            try {
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') return;
                // Register service worker
                const reg = await navigator.serviceWorker.register('sw.js');
                // Save subscription info locally
                const subs = JSON.parse(localStorage.getItem('queue_subscriptions') || '[]');
                subs.push({ group: groupNumber, name: userName, time: Date.now() });
                localStorage.setItem('queue_subscriptions', JSON.stringify(subs));
                console.log('Notification subscription saved for Group', groupNumber);
            } catch (e) {
                console.log('Push notification setup skipped:', e.message);
            }
        }
    </script>
</body>
</html>
